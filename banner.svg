<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="fadeMask">
      <rect width="900" height="280" fill="white"/>
      <rect x="600" width="300" height="280" fill="url(#fadeGrad)"/>
    </mask>
    <linearGradient id="fadeGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#080808"/>

  <!-- Grain overlay -->
  <rect width="900" height="280" fill="#111" filter="url(#grain)" opacity="0.35"/>

  <!-- Crack lines - decorative -->
  <g stroke="#1a1a1a" stroke-width="0.5" opacity="0.6">
    <line x1="700" y1="0" x2="680" y2="140"/>
    <line x1="680" y1="140" x2="720" y2="280"/>
    <line x1="750" y1="20" x2="730" y2="120"/>
    <line x1="730" y1="120" x2="760" y2="200"/>
    <line x1="800" y1="0" x2="770" y2="90"/>
    <line x1="770" y1="90" x2="810" y2="180"/>
    <line x1="810" y1="180" x2="790" y2="280"/>
  </g>

  <!-- Particles dispersing to the right -->
  <g fill="#e8e8e8" opacity="0.9">
    <!-- Dense near text -->
    <rect x="420" y="60" width="2" height="6" opacity="0.9"/>
    <rect x="430" y="45" width="1.5" height="5" opacity="0.85"/>
    <rect x="445" y="70" width="2" height="4" opacity="0.8"/>
    <rect x="460" y="40" width="1" height="7" opacity="0.75"/>
    <rect x="470" y="80" width="2" height="3" opacity="0.7"/>
    <rect x="485" y="55" width="1.5" height="5" opacity="0.65"/>
    <!-- Medium density -->
    <rect x="500" y="35" width="1" height="4" opacity="0.6"/>
    <rect x="510" y="90" width="2" height="3" opacity="0.55"/>
    <rect x="525" y="50" width="1" height="6" opacity="0.5"/>
    <rect x="535" y="25" width="1.5" height="4" opacity="0.45"/>
    <rect x="548" y="75" width="1" height="5" opacity="0.4"/>
    <rect x="555" y="110" width="2" height="3" opacity="0.38"/>
    <rect x="565" y="30" width="1" height="4" opacity="0.35"/>
    <rect x="578" y="65" width="1.5" height="3" opacity="0.3"/>
    <rect x="590" y="20" width="1" height="5" opacity="0.28"/>
    <!-- Sparse far -->
    <rect x="605" y="85" width="1" height="3" opacity="0.22"/>
    <rect x="618" y="45" width="1.5" height="2" opacity="0.18"/>
    <rect x="635" y="100" width="1" height="4" opacity="0.15"/>
    <rect x="648" y="30" width="1" height="3" opacity="0.12"/>
    <rect x="660" y="70" width="1.5" height="2" opacity="0.1"/>
    <rect x="675" y="55" width="1" height="3" opacity="0.08"/>
    <rect x="690" y="20" width="1" height="2" opacity="0.06"/>
    <rect x="710" y="80" width="1" height="2" opacity="0.05"/>
    <rect x="730" y="40" width="1" height="2" opacity="0.04"/>
    <rect x="755" y="65" width="1" height="1.5" opacity="0.03"/>
    <rect x="780" y="30" width="1" height="1.5" opacity="0.02"/>
    <!-- Second cluster - lower row -->
    <rect x="425" y="150" width="2" height="5" opacity="0.85"/>
    <rect x="438" y="165" width="1.5" height="4" opacity="0.8"/>
    <rect x="452" y="145" width="1" height="6" opacity="0.75"/>
    <rect x="465" y="170" width="2" height="3" opacity="0.7"/>
    <rect x="478" y="135" width="1.5" height="5" opacity="0.65"/>
    <rect x="492" y="160" width="1" height="4" opacity="0.6"/>
    <rect x="505" y="180" width="2" height="3" opacity="0.52"/>
    <rect x="518" y="140" width="1" height="5" opacity="0.45"/>
    <rect x="530" y="175" width="1.5" height="3" opacity="0.38"/>
    <rect x="545" y="155" width="1" height="4" opacity="0.3"/>
    <rect x="560" y="190" width="1" height="3" opacity="0.22"/>
    <rect x="575" y="145" width="1.5" height="2" opacity="0.18"/>
    <rect x="595" y="170" width="1" height="3" opacity="0.13"/>
    <rect x="615" y="160" width="1" height="2" opacity="0.09"/>
    <rect x="640" y="185" width="1" height="2" opacity="0.06"/>
    <rect x="665" y="155" width="1" height="2" opacity="0.04"/>
    <!-- Top scatter -->
    <rect x="435" y="20" width="1" height="3" opacity="0.4"/>
    <rect x="455" y="10" width="1.5" height="2" opacity="0.35"/>
    <rect x="480" y="15" width="1" height="4" opacity="0.3"/>
    <rect x="510" y="8" width="1" height="3" opacity="0.22"/>
    <rect x="535" y="18" width="1.5" height="2" opacity="0.16"/>
    <rect x="562" y="5" width="1" height="3" opacity="0.1"/>
    <rect x="590" y="12" width="1" height="2" opacity="0.06"/>
    <!-- Bottom scatter -->
    <rect x="430" y="230" width="2" height="4" opacity="0.55"/>
    <rect x="448" y="245" width="1.5" height="3" opacity="0.48"/>
    <rect x="465" y="225" width="1" height="5" opacity="0.4"/>
    <rect x="485" y="250" width="2" height="3" opacity="0.32"/>
    <rect x="505" y="235" width="1.5" height="4" opacity="0.25"/>
    <rect x="525" y="255" width="1" height="3" opacity="0.18"/>
    <rect x="550" y="240" width="1" height="2" opacity="0.12"/>
    <rect x="575" y="260" width="1.5" height="2" opacity="0.08"/>
  </g>

  <!-- Horizontal rule top -->
  <line x1="40" y1="38" x2="400" y2="38" stroke="#333" stroke-width="0.5"/>

  <!-- Main name -->
  <text x="44" y="120"
    font-family="'Courier New', Courier, monospace"
    font-size="52"
    font-weight="700"
    fill="#f0f0f0"
    letter-spacing="-1"
    filter="url(#glow)">АЛЕКСАНДР</text>

  <text x="44" y="178"
    font-family="'Courier New', Courier, monospace"
    font-size="52"
    font-weight="700"
    fill="#f0f0f0"
    letter-spacing="-1">ПИВОВАРОВ</text>

  <!-- Tag line -->
  <text x="46" y="218"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="#666"
    letter-spacing="3">PYTHON · BOTS · AUTOMATION · ML</text>

  <!-- Bottom rule -->
  <line x1="40" y1="242" x2="400" y2="242" stroke="#333" stroke-width="0.5"/>

  <!-- Corner marks brutalist -->
  <g stroke="#444" stroke-width="1" fill="none">
    <polyline points="20,20 20,8 32,8"/>
    <polyline points="868,20 868,8 856,8"/>
    <polyline points="20,260 20,272 32,272"/>
    <polyline points="868,260 868,272 856,272"/>
  </g>

  <!-- Small label bottom right -->
  <text x="820" y="272"
    font-family="'Courier New', Courier, monospace"
    font-size="9"
    fill="#333"
    letter-spacing="1">github.com</text>
</svg>
